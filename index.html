<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nosso Tempo</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background:linear-gradient(180deg, #4a1030 0%, #2a0d24 50%, #12000a 100%);
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    overflow:hidden;
  }
  .phone {
    width:100%;
    max-width:430px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 26px;
    position:relative;
    z-index:2;
  }

  /* corações de fundo subindo */
  #hearts { position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
  .fheart {
    position:absolute; bottom:-40px;
    color:rgba(255,90,140,.85);
    animation:rise linear infinite;
    text-shadow:0 0 12px rgba(255,80,130,.7);
    will-change:transform, opacity;
  }
  @keyframes rise {
    0%   { transform:translateY(0) scale(.6) rotate(0deg); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:.9; }
    100% { transform:translateY(-115vh) scale(1.1) rotate(25deg); opacity:0; }
  }

  .cover {
    width:100%;
    aspect-ratio:1/1;
    border-radius:16px;
    background:#2a2a2a;
    box-shadow:0 0 0 3px rgba(255,120,160,.4), 0 24px 55px rgba(0,0,0,.6), 0 0 45px rgba(255,70,130,.35);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    cursor:pointer;
    animation:coverGlow 3s ease-in-out infinite;
  }
  @keyframes coverGlow {
    0%,100% { box-shadow:0 0 0 3px rgba(255,120,160,.4), 0 24px 55px rgba(0,0,0,.6), 0 0 40px rgba(255,70,130,.3); }
    50%     { box-shadow:0 0 0 3px rgba(255,150,190,.7), 0 24px 55px rgba(0,0,0,.6), 0 0 70px rgba(255,90,150,.6); }
  }
  .cover img { width:100%; height:100%; object-fit:cover; display:none; }
  .cover .placeholder {
    text-align:center; padding:20px; color:#c98aa5; font-size:15px;
  }
  .cover .placeholder .ico { font-size:46px; display:block; margin-bottom:12px; }

  .counter { margin-top:44px; text-align:center; }
  .counter .big {
    font-size:34px; font-weight:800; letter-spacing:1px;
    font-variant-numeric:tabular-nums;
    text-shadow:0 0 18px rgba(255,90,150,.6);
  }
  .counter .sub {
    font-size:22px; font-weight:700; color:#e6a9c4; margin-top:14px;
    text-transform:uppercase; letter-spacing:2px;
    text-shadow:0 0 14px rgba(255,90,150,.5);
  }
  .counter .sub .hbeat { display:inline-block; animation:beat 1.4s ease-in-out infinite; }

  .upload { margin-top:40px; }
  .upload label {
    display:block; background:rgba(255,255,255,.1); border:1px solid rgba(255,150,190,.4);
    border-radius:24px; padding:12px 26px; text-align:center; font-size:14px; cursor:pointer;
  }
  .upload label:active { background:rgba(255,255,255,.2); }
  .upload input { display:none; }

  /* tela inicial */
  #enter {
    position:fixed; inset:0; z-index:99;
    background:#000;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; cursor:pointer; overflow:hidden;
    transition:opacity .7s ease;
  }
  #enter .pulse {
    font-size:64px; margin-bottom:26px; position:relative; z-index:2;
    animation:beat 1.5s ease-in-out infinite;
    text-shadow:0 0 30px rgba(255,80,130,.9);
  }
  #enter .msg { font-size:23px; font-weight:700; letter-spacing:.5px; position:relative; z-index:2; }
  #enter .small { font-size:13px; color:#e6a9c4; margin-top:10px; letter-spacing:1px; position:relative; z-index:2; }
  @keyframes beat {
    0%,100% { transform:scale(1); }
    25% { transform:scale(1.18); }
    40% { transform:scale(1); }
    60% { transform:scale(1.12); }
  }
  #enter.hide { opacity:0; pointer-events:none; }

  /* burst de corações ao clicar */
  .burst {
    position:fixed; z-index:98; pointer-events:none;
    font-size:26px; color:#ff5a8c;
    text-shadow:0 0 12px rgba(255,80,130,.8);
    animation:burst .9s ease-out forwards;
  }
  @keyframes burst {
    0% { transform:translate(0,0) scale(.4); opacity:1; }
    100% { transform:translate(var(--tx), var(--ty)) scale(1.2); opacity:0; }
  }
</style>
</head>
<body>

<div id="hearts"></div>

<div class="phone">
  <div class="cover">
    <img id="coverImg" src="assets/cover.jpg" alt="foto">
    <div class="placeholder" id="coverPlaceholder">
      <span class="ico">&#128247;</span>
      Sua foto aqui
    </div>
  </div>

  <div class="counter">
    <div class="big" id="counterBig">--</div>
    <div class="sub">Ester and Davi <span class="hbeat">&#10084;</span></div>
  </div>
</div>

<div id="enter">
  <div class="msg">Clique para come&ccedil;ar</div>
</div>

<audio id="audio" loop src="assets/music.mp3"></audio>

<script>
  const inicio = new Date(2026, 4, 4, 16, 25, 0);
  const counterBig = document.getElementById('counterBig');
  function pad(n){ return String(n).padStart(2,'0'); }
  function atualizar(){
    let diff = Math.floor((Date.now() - inicio.getTime()) / 1000);
    if (diff < 0) diff = 0;
    const dias = Math.floor(diff / 86400);
    const horas = Math.floor((diff % 86400) / 3600);
    const min = Math.floor((diff % 3600) / 60);
    const seg = diff % 60;
    counterBig.textContent = dias + ' dias ' + pad(horas) + ':' + pad(min) + ':' + pad(seg);
  }
  atualizar();
  setInterval(atualizar, 1000);

  const coverImg = document.getElementById('coverImg');
  const coverPlaceholder = document.getElementById('coverPlaceholder');
  // Mostra a foto automaticamente se você tiver colocado um src no <img id="coverImg">
  if (coverImg.getAttribute('src')) {
    coverImg.style.display = 'block';
    coverPlaceholder.style.display = 'none';
  }

  // corações de fundo subindo
  const heartsBox = document.getElementById('hearts');
  const emojis = ['\u2764','\uD83D\uDC96','\uD83D\uDC95','\uD83D\uDC9E','\uD83D\uDC97'];
  function spawnHeart(){
    const h = document.createElement('div');
    h.className = 'fheart';
    h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    h.style.left = Math.random()*100 + 'vw';
    h.style.fontSize = (16 + Math.random()*26) + 'px';
    const dur = 6 + Math.random()*6;
    h.style.animationDuration = dur + 's';
    h.style.opacity = 0.4 + Math.random()*0.5;
    heartsBox.appendChild(h);
    setTimeout(()=>h.remove(), dur*1000);
  }
  setInterval(spawnHeart, 450);
  for(let i=0;i<8;i++) setTimeout(spawnHeart, i*250);

  // tela inicial: clicar entra, toca a musica e solta um burst de corações
  const audio = document.getElementById('audio');
  const enter = document.getElementById('enter');
  audio.volume = 1;
  audio.muted = false;

  function tocar(){
    audio.muted = false;
    audio.volume = 1;
    const p = audio.play();
    if (p && p.catch) {
      p.catch(()=>{
        // se bloqueou, tenta de novo no proximo toque em qualquer lugar
        document.addEventListener('click', ()=>audio.play(), { once:true });
        document.addEventListener('touchstart', ()=>audio.play(), { once:true });
      });
    }
  }

  enter.addEventListener('click', (e)=>{
    tocar();
    // burst
    for(let i=0;i<14;i++){
      const b = document.createElement('div');
      b.className = 'burst';
      b.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      b.style.left = (e.clientX || window.innerWidth/2) + 'px';
      b.style.top = (e.clientY || window.innerHeight/2) + 'px';
      const ang = Math.random()*Math.PI*2;
      const dist = 80 + Math.random()*140;
      b.style.setProperty('--tx', Math.cos(ang)*dist + 'px');
      b.style.setProperty('--ty', Math.sin(ang)*dist + 'px');
      document.body.appendChild(b);
      setTimeout(()=>b.remove(), 900);
    }
    enter.classList.add('hide');
    setTimeout(()=>{ enter.style.display='none'; }, 700);
  });
</script>
</body>
</html>
